# Fix for Scenario 1 — same workload with adequate memory limits.
apiVersion: v1
kind: Pod
metadata:
  name: payment-simulator
  namespace: kube-memory-test
  labels:
    app: payment-simulator
    scenario: oom-fixed
spec:
  restartPolicy: Never
  containers:
    - name: payment-api
      image: polinux/stress
      args: ["stress", "--vm", "1", "--vm-bytes", "80M", "--timeout", "30s"]
      resources:
        requests:
          memory: "128Mi"
          cpu: "50m"
        limits:
          memory: "256Mi"
          cpu: "200m"
