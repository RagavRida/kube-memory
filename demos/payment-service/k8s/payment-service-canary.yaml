# Canary payment-service — OOM demo: low memory limit + delayed memory leak.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service-canary
  namespace: payment-demo
  labels:
    app: payment-service
    version: canary
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-service
      version: canary
  template:
    metadata:
      labels:
        app: payment-service
        version: canary
        scenario: oom-canary
    spec:
      containers:
        - name: payment-api
          image: payment-service:canary
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: VERSION
              value: canary
            - name: MEMORY_LEAK
              value: "true"
            - name: LEAK_DELAY_MS
              value: "20000"
            - name: LEAK_CHUNK_MB
              value: "16"
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "64Mi"
              cpu: "100m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
