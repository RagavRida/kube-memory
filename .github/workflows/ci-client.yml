name: CI Client

on:
  push:
    paths:
      - "client/**"
      - ".github/workflows/ci-client.yml"
  pull_request:
    paths:
      - "client/**"
      - ".github/workflows/ci-client.yml"

defaults:
  run:
    working-directory: client

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint
